# Production overrides: Docker secrets, resource limits, logging
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#    or: make prod

services:
  db:
    secrets:
      - db_password
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  app:
    # replicas > 1 không dùng được cùng container_name cố định → reset để compose tự đặt tên
    container_name: !reset null
    secrets:
      - admin_key
    environment:
      BRIGHTIFY_ADMIN_KEY_FILE: /run/secrets/admin_key
      LOG_LEVEL: INFO
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
        reservations:
          memory: 2G
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

secrets:
  db_password:
    file: ./var/secrets/db_password.txt
  admin_key:
    file: ./var/secrets/admin_key.txt
