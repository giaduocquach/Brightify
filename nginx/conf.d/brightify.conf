# =============================================================================
# Brightify reverse proxy
#
# Mặc định: HTTP-only (port 80) — chạy được ngay không cần cert.
# Khi có domain + cert Let's Encrypt: bật block HTTPS ở cuối file và đổi
# block HTTP thành redirect (xem hướng dẫn cuối file).
# =============================================================================

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (để khi xin cert)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Recommendation + backtest endpoints (rate limit chặt hơn, timeout dài cho ML)
    location ~ ^/api/(recommend|backtest)/ {
        limit_req zone=api_recommend burst=10 nodelay;

        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }

    # Audio streaming (no buffering, hỗ trợ Range)
    location /api/audio/stream/ {
        proxy_pass http://app:8000;
        proxy_buffering off;
        proxy_set_header Range $http_range;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Album art / artist image (cache)
    location ~ ^/api/(album-art|artist-image)/ {
        proxy_pass http://app:8000;
        proxy_cache_valid 200 24h;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # API chung
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;

        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # Hashed, immutable SPA assets — let the browser cache hard.
    location /assets/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA (index.html + client-side routing) — served by the app (FastAPI serves static_spa/).
    # The app itself owns the frontend, so nginx is a pure reverse proxy (matches the AWS variant).
    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# =============================================================================
# HTTPS — bật khi đã có domain + cert. Các bước:
#   1. Đổi `server_name _;` ở block 80 thành domain thật.
#   2. Xin cert:  certbot certonly --webroot -w ./nginx/www -d brightify.example.com
#      (cert lưu vào nginx/certs → mount tới /etc/letsencrypt)
#   3. Bỏ comment block dưới, đổi brightify.example.com thành domain thật.
#   4. Trong block 80, thay phần `location /` + các `location /api` bằng:
#         location / { return 301 https://$host$request_uri; }
#      (giữ lại location /.well-known/acme-challenge/ để renew).
