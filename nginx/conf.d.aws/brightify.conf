# =============================================================================
# Brightify reverse proxy — AWS variant (HTTPS enabled for brightify.studio)
#
# The app image (built in CI) serves the React SPA itself, so nginx is a pure
# reverse proxy: everything goes to app:8000. Audio is a 302 from the app to S3.
# Rate-limit zones (api_general, api_recommend) are defined in nginx/nginx.conf.
# =============================================================================

# HTTP :80 — ACME challenge + redirect everything else to HTTPS.
server {
    listen 80;
    server_name brightify.studio www.brightify.studio;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS :443 — the app.
server {
    listen 443 ssl;
    http2 on;
    server_name brightify.studio www.brightify.studio;

    ssl_certificate     /etc/letsencrypt/live/brightify.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brightify.studio/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Recommendation + backtest (tighter rate limit, longer timeout for ML)
    location ~ ^/api/(recommend|backtest)/ {
        limit_req zone=api_recommend burst=10 nodelay;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Audio: app returns a 302 to S3. Just pass it through.
    location /api/audio/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Album art / artist image (cache at the edge)
    location ~ ^/api/(album-art|artist-image)/ {
        proxy_pass http://app:8000;
        proxy_cache_valid 200 24h;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # General API
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # Hashed, immutable SPA assets — let the browser cache hard.
    location /assets/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA (index.html + client-side routing) — served by the app.
    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
