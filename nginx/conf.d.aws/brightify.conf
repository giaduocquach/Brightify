# =============================================================================
# Brightify reverse proxy — AWS variant
#
# The app image (built in CI) serves the React SPA itself, so nginx is a pure
# reverse proxy: everything goes to app:8000, including "/" (SPA) and "/assets".
# Audio is a 302 from the app to CloudFront, so it never streams through here.
#
# HTTP-only by default. Enable the HTTPS block (bottom) once a domain + cert exist.
# Rate-limit zones (api_general, api_recommend) are defined in nginx/nginx.conf.
# =============================================================================

server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Recommendation + backtest (tighter rate limit, longer timeout for ML)
    location ~ ^/api/(recommend|backtest)/ {
        limit_req zone=api_recommend burst=10 nodelay;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Audio: app returns a 302 to CloudFront. Just pass it through.
    location /api/audio/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Album art / artist image (cache at the edge)
    location ~ ^/api/(album-art|artist-image)/ {
        proxy_pass http://app:8000;
        proxy_cache_valid 200 24h;
        add_header X-Cache-Status $upstream_cache_status;
    }

    # General API
    location /api/ {
        limit_req zone=api_general burst=20 nodelay;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
    }

    # Hashed, immutable SPA assets — let the browser cache hard.
    location /assets/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA (index.html + client-side routing) — served by the app.
    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

