name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend build + typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build   # `tsc && vite build` — typecheck + bundle to ../static_spa

  backend:
    name: Backend compile-check + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # Catch syntax/import-time errors across the backend (incl. the refactored
      # core/ranking, core/color_va, core/explain, api/serialization, tools/mert_encoder).
      - name: Compile-check
        run: python -m compileall -q api core db tools app.py config.py logging_config.py
      # Data-free unit tests. The full engine/pipeline tests run locally (data/ embeddings
      # + the heavy pipeline deps — essentia/librosa/yt-dlp — are absent in CI, so the engine
      # can't boot). The web-server deps cover the colour-mapping unit tests (the refactor's
      # colour_va path). Engine-loading tests are marked `slow` and excluded here.
      - name: Unit tests (data-free)
        run: |
          pip install -r requirements-app.txt pytest
          pytest -m "not slow" test/test_color_reco.py -q

  docker-build:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
