name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# OIDC: short-lived AWS creds, no stored access keys.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build image + deploy to EC2
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # Build a fresh SPA so it gets baked into the app image (COPY . /app).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }}
            ${{ secrets.ECR_REPOSITORY_URL }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on EC2 via SSM
        run: |
          set -euo pipefail
          IMAGE="${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }}"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy ${{ github.sha }}" \
            --parameters "commands=[\"bash /opt/brightify/scripts/deploy-remote.sh '$IMAGE' '${{ github.sha }}'\"]" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "{Status:Status,Out:StandardOutputContent,Err:StandardErrorContent}" --output json
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" --output text)
          echo "Deploy status: $STATUS"
          test "$STATUS" = "Success"
